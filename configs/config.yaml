# ATE RAG Knowledge Base Configuration

# Data paths
data:
  raw_dir: "./data/raw"
  processed_dir: "./data/processed"
  markdown_dir: "./data/raw/markdown"
  json_dir: "./data/raw/json"
  assets_dir: "./data/raw/assets"
  toc_tree: "./data/raw/toc_tree.json"
  href_map: "./data/raw/href_map.json"

# Increment when ingestion schema or persisted sparse-vector semantics change.
ingestion:
  schema_version: 6

# Embedding model configuration
embedding:
  # Provider options:
  # - local: use the prepared sentence-transformers cache under cache_dir.
  # - openai_compatible: call embedding.api.base_url with the API key stored in
  #   the environment variable named by embedding.api.api_key_env.
  # Windows/cloud API setup: set ATE_KB_EMBEDDING_PROVIDER=openai_compatible
  # in PowerShell, or replace this value with "openai_compatible".
  provider: "${ATE_KB_EMBEDDING_PROVIDER:-local}"
  model_name: "${ATE_KB_EMBEDDING_MODEL:-BAAI/bge-m3}"
  device: "${ATE_KB_QUERY_DEVICE:-cpu}"
  ingest_device: "${ATE_KB_INGEST_DEVICE:-auto}"
  normalize_embeddings: true
  batch_size: 8
  max_seq_length: 512
  cache_dir: "${ATE_KB_MODEL_CACHE:-./embeddings/cache}"
  # false: allow first-time model download; true: require a prepared local cache.
  local_files_only: true
  query_instruction: "Represent this sentence for searching relevant passages: "
  api:
    base_url: "${ATE_KB_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}"
    # This is the environment variable name, not the secret value.
    # Do not paste API keys into config.yaml. Example Windows user env var:
    # [Environment]::SetEnvironmentVariable("SILICONFLOW_API_KEY", "<key>", "User")
    api_key_env: "${ATE_KB_EMBEDDING_API_KEY_ENV:-SILICONFLOW_API_KEY}"
    timeout_seconds: 60

# Vector store configuration
# mode: "server" (Docker/multi-process, default). "local" is deprecated and will raise.
# Server mode: prefer url, fallback to host:port
# Legacy: use_local=true also raises a deprecation error
vector_store:
  type: "qdrant"
  mode: "server"
  url: "http://localhost:6333"
  host: "localhost"
  port: 6333
  collection_name: "ate_kb"
  grpc_port: 6334
  prefer_grpc: false
  # Keep each Qdrant HTTP payload comfortably below the default 32 MiB limit.
  upsert_batch_size: 128
  local_path: "./data/qdrant_storage"
  use_local: false

# Document scope and software version configuration
documents:
  enabled_scopes:
    - vendor: "teradyne"
      platform: "j750"
      software: "igxl"
    - vendor: "advantest"
      platform: "v93000"
      software: "smt7"
  enabled_ecosystems:
    - "v93000"
  v93000:
    enabled_software_versions:
      - "smt7"
    include_general_docs: true
    default_software_version: "ask"
    ambiguity_policy: "ask_when_multiple"
  igxl:
    enabled: true

# Collection schema
schema:
  vector_size: 1024
  distance: "Cosine"
  enable_sparse_vectors: true
  payload_indexes:
    - field: "vendor"
      type: "keyword"
    - field: "platform"
      type: "keyword"
    - field: "software"
      type: "keyword"
    - field: "software_release"
      type: "keyword"
    - field: "doc_type"
      type: "keyword"
    - field: "ecosystem"
      type: "keyword"
    - field: "software_version"
      type: "keyword"
    - field: "doc_family"
      type: "keyword"
    - field: "toc_path"
      type: "keyword"
    - field: "chunk_type"
      type: "keyword"
    - field: "source_md"
      type: "text"
    - field: "doc_title"
      type: "text"

# Chunking configuration
chunking:
  strategies:
    document:
      enabled: true
      max_length: 8000
      overlap: 200
    section:
      enabled: true
      max_length: 4000
      overlap: 100
    subsection:
      enabled: true
      max_length: 2000
      overlap: 50
    code_block:
      enabled: true
      max_length: 1500
      overlap: 0
    table:
      enabled: true
      max_length: 3000
      overlap: 0
  split_headings: ["h1", "h2", "h3", "h4"]

# Retrieval configuration
retrieval:
  timing:
    enabled: true
    log_threshold_ms: 500
  vector_search:
    top_k: 20
  sparse_search:
    enabled: true
    top_k: 20
  bm25_search:
    enabled: true
    top_k: 20
    k1: 1.5
    b: 0.75
  hybrid:
    enabled: true
    dense_weight: 0.7
    sparse_weight: 0.3
    final_top_k: 10
    legacy_bm25_fallback: true
  reranker:
    enabled: true
    # Provider options:
    # - http: call reranker.api.base_url with the API key stored in the
    #   environment variable named by reranker.api.api_key_env.
    # - local: use the local CrossEncoder model cache on developer machines.
    provider: "${ATE_KB_RERANKER_PROVIDER:-http}"
    fallback_on_error: true
    model_name: "${ATE_KB_RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}"
    top_k: 5
    batch_size: 4
    device: "${ATE_KB_RERANKER_DEVICE:-cpu}"
    # Rerank input shaping: limits what is sent to the reranker API
    input:
      max_candidates: 32
      max_chars_per_document: 2400
      max_chunks_per_source: 2
      min_sources: 6
      prefer_section_chunks: true
      preserve_title_matches: 3
    api:
      base_url: "${ATE_KB_RERANKER_BASE_URL:-https://api.siliconflow.cn/v1}"
      # This is the environment variable name, not the secret value.
      # By default embedding and reranker both read SILICONFLOW_API_KEY.
      api_key_env: "${ATE_KB_RERANKER_API_KEY_ENV:-SILICONFLOW_API_KEY}"
      timeout_seconds: 30
      top_n: 32
      max_chunks_per_doc: 8
      overlap_tokens: 40
    # Broad-concept query overrides
    broad_candidate_top_k: 40
    broad_final_top_k: 14
    broad_max_sources: 8
    broad_min_sources: 3
    broad_max_chunks_per_source: 3
  broad_context:
    enabled: true
    seed_sources: 4
    max_sources: 32
    max_hops: 2
    max_chunks: 16
    max_chunks_per_source: 3
    max_tokens: 9000
    document_max_chars: 9000
    sections_per_source: 2
  parent_child:
    enabled: true
    include_parent: true
    include_siblings: true
    include_children: false
    max_siblings: 2
  compression:
    enabled: true
    merge_adjacent: true
    remove_duplicates: true
    max_tokens: 4000
  planner:
    title_boost_factor: 0.15
    glossary_enabled: true
    auto_filter_enabled: true
    context_enrichment_enabled: true

# API server configuration
api:
  host: "0.0.0.0"
  port: 8080
  reload: false
  workers: 1

# Logging
logging:
  level: "INFO"
  format: "json"

# Claude Code integration
claude_code:
  skill_name: "ate-kb"
  max_chunks_per_query: 8
  enable_citations: true

# Evaluation configuration
evaluation:
  dataset_dir: "./eval/v1"
  default_k_values: [1, 3, 5, 10]
  output_dir: "./reports"
  thresholds:
    hit_at_1: 0.30
    hit_at_3: 0.50
    hit_at_5: 0.65
    hit_at_10: 0.75
    recall_at_5: 0.40
    mrr_at_5: 0.45
    source_precision_at_5: 0.65
